<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Projects - The Missions</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(10, 20, 40, 0.6);
            --glass-border: rgba(0, 210, 255, 0.3);
            --neon-blue: #00d2ff;
            --neon-purple: #bd00ff;
            --text-main: #ffffff;
            --text-secondary: #b3c5ef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            position: relative;
        }

        /* --- Background Effects --- */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 50% 50%, rgba(13, 20, 40, 0.0), #05070a 90%);
        }
        
        .nebula {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: 
                radial-gradient(circle at 10% 20%, rgba(68, 0, 255, 0.1), transparent 50%),
                radial-gradient(circle at 90% 80%, rgba(0, 210, 255, 0.1), transparent 50%);
            z-index: -1;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
            position: sticky;
            top: 0;
            z-index: 100;
            background: rgba(5, 7, 10, 0.8);
            border-bottom: 1px solid rgba(255,255,255,0.1);
        }

        .nav-links { display: flex; gap: 30px; }
        .nav-links a {
            color: #aaa; text-decoration: none; font-family: 'Orbitron', sans-serif; 
            font-size: 0.9rem; transition: 0.3s;
        }
        .nav-links a.active, .nav-links a:hover {
            color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- Header Section --- */
        .header-section {
            text-align: center;
            padding: 40px 20px 20px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 3rem;
            background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            margin-bottom: 10px;
        }

        .section-subtitle {
            color: var(--text-main);
            font-size: 1.1rem;
            letter-spacing: 1px;
        }

        /* --- Filter Buttons --- */
        .filter-container {
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
            gap: 15px;
            margin: 30px 0 50px;
            padding: 0 20px;
        }

        .filter-btn {
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--glass-border);
            color: #ccc;
            padding: 10px 25px;
            border-radius: 30px;
            cursor: pointer;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.85rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .filter-btn:hover, .filter-btn.active {
            background: rgba(0, 210, 255, 0.2);
            border-color: var(--neon-blue);
            color: white;
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
            transform: translateY(-2px);
        }

        /* --- Projects Grid --- */
        .projects-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 30px;
            padding: 20px 5%;
            max-width: 1600px;
            margin: 0 auto;
        }

        /* --- Project Card --- */
        .project-card {
            background: var(--card-bg);
            backdrop-filter: blur(12px);
            border: 1px solid var(--glass-border);
            border-radius: 15px;
            padding: 20px;
            transition: all 0.4s ease;
            position: relative;
            overflow: hidden;
            display: flex;
            flex-direction: column;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.5);
        }

        .project-card:hover {
            transform: translateY(-10px);
            border-color: var(--neon-blue);
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.2), inset 0 0 20px rgba(0, 210, 255, 0.05);
        }

        /* Card Image Area */
        .card-img-container {
            width: 100%;
            height: 180px;
            border-radius: 10px;
            overflow: hidden;
            margin-bottom: 20px;
            border: 1px solid rgba(255, 255, 255, 0.1);
            position: relative;
        }

        .card-img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transition: transform 0.5s ease;
        }

        .project-card:hover .card-img {
            transform: scale(1.1);
        }

        /* Card Content */
        .mission-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--neon-blue);
            letter-spacing: 1px;
            text-transform: uppercase;
            margin-bottom: 5px;
        }

        .project-title {
            font-size: 1.5rem;
            color: white;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .tech-orbit-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--text-secondary);
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .tech-icons {
            display: flex;
            gap: 15px;
            margin-bottom: 20px;
            font-size: 1.8rem;
        }

        .mission-brief-label {
            font-family: 'Orbitron', sans-serif;
            font-size: 0.7rem;
            color: var(--neon-blue);
            margin-bottom: 5px;
            text-transform: uppercase;
        }

        .mission-desc {
            font-size: 0.9rem;
            color: var(--text-secondary);
            line-height: 1.6;
            margin-bottom: 25px;
            flex-grow: 1; /* Pushes buttons to bottom */
        }

        /* Buttons */
        .card-buttons {
            display: flex;
            gap: 15px;
        }

        .btn-card {
            flex: 1;
            padding: 10px 0;
            text-align: center;
            border: 1px solid var(--glass-border);
            border-radius: 8px;
            color: white;
            text-decoration: none;
            font-size: 0.9rem;
            transition: 0.3s;
            background: rgba(255, 255, 255, 0.05);
        }

        .btn-card:hover {
            background: var(--neon-blue);
            color: #000;
            border-color: var(--neon-blue);
            box-shadow: 0 0 15px var(--neon-blue);
            font-weight: 600;
        }

        /* Animation for filtering */
        @keyframes fadeIn {
            from { opacity: 0; transform: scale(0.9); }
            to { opacity: 1; transform: scale(1); }
        }
        
        .fade-in {
            animation: fadeIn 0.4s ease forwards;
        }

        /* Tech Colors for Icons */
        .icon-react { color: #61dafb; filter: drop-shadow(0 0 5px rgba(97, 218, 251, 0.5)); }
        .icon-js { color: #f7df1e; filter: drop-shadow(0 0 5px rgba(247, 223, 30, 0.5)); }
        .icon-python { color: #3776ab; filter: drop-shadow(0 0 5px rgba(55, 118, 171, 0.5)); }
        .icon-sql { color: #00758f; filter: drop-shadow(0 0 5px rgba(0, 117, 143, 0.5)); }
        .icon-html { color: #e34f26; filter: drop-shadow(0 0 5px rgba(227, 79, 38, 0.5)); }
        .icon-css { color: #2965f1; filter: drop-shadow(0 0 5px rgba(41, 101, 241, 0.5)); }
        .icon-node { color: #6cc24a; filter: drop-shadow(0 0 5px rgba(108, 194, 74, 0.5)); }

        @media (max-width: 768px) {
            .section-title { font-size: 2rem; }
            .projects-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>

    <div class="stars" id="star-bg"></div>
    <div class="nebula"></div>

    <nav>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Skills</a>
            <a href="#" class="active">Projects</a>
            <a href="#">Resume</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <div class="header-section">
        <h1 class="section-title">Projects - The Missions</h1>
        <p class="section-subtitle">Proving skills through executed missions.</p>
    </div>

    <div class="filter-container">
        <button class="filter-btn active" onclick="filterProjects('all', this)">All</button>
        <button class="filter-btn" onclick="filterProjects('react', this)">React Planet</button>
        <button class="filter-btn" onclick="filterProjects('node', this)">Node Planet</button>
        <button class="filter-btn" onclick="filterProjects('python', this)">Python Planet</button>
        <button class="filter-btn" onclick="filterProjects('web', this)">HTML/CSS Planet</button>
        <button class="filter-btn" onclick="filterProjects('db', this)">Database Planet</button>
    </div>

    <div class="projects-grid" id="projects-grid">
        </div>

    <script>
        // --- Star Background Generator ---
        document.addEventListener('DOMContentLoaded', () => {
            const starBg = document.getElementById('star-bg');
            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.background = 'white';
                star.style.borderRadius = '50%';
                star.style.left = `${Math.random() * 100}%`;
                star.style.top = `${Math.random() * 100}%`;
                const size = Math.random() * 2;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.opacity = Math.random();
                starBg.appendChild(star);
            }
            renderProjects('all'); // Initial Load
        });

        // --- Project Data ---
        const projects = [
            {
                id: 1,
                name: "Project Alpha",
                category: ["react"],
                techOrbit: ["fab fa-react icon-react", "fab fa-js icon-js"],
                brief: "A dynamic single-page application for real-time data visualization, solving complex data analysis problems for users.",
                img: "https://images.unsplash.com/photo-1551288049-bebda4e38f71?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 2,
                name: "Project Beta",
                category: ["python", "db"],
                techOrbit: ["fab fa-python icon-python", "fas fa-database icon-sql"],
                brief: "A backend-focused project creating a robust API and database management system for e-commerce.",
                img: "https://images.unsplash.com/photo-1555099962-4199c345e5dd?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 3,
                name: "Project Gamma",
                category: ["web"],
                techOrbit: ["fab fa-html5 icon-html", "fab fa-js icon-js"],
                brief: "A responsive, interactive front-end interface for a portfolio website, emphasizing user experience.",
                img: "https://images.unsplash.com/photo-1461749280684-dccba630e2f6?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 4,
                name: "Project Delta",
                category: ["react", "db"],
                techOrbit: ["fab fa-react icon-react", "fas fa-database icon-sql"],
                brief: "A full-stack social media dashboard with user authentication and content management features.",
                img: "https://images.unsplash.com/photo-1517694712202-14dd9538aa97?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 5,
                name: "Project Epsilon",
                category: ["node", "js"],
                techOrbit: ["fab fa-node-js icon-node", "fab fa-js icon-js"],
                brief: "Real-time chat application utilizing WebSockets for instant communication.",
                img: "https://images.unsplash.com/photo-1550751827-4bd374c3f58b?q=80&w=1000&auto=format&fit=crop"
            },
            {
                id: 6,
                name: "Project Zeta",
                category: ["web", "react"],
                techOrbit: ["fab fa-css3-alt icon-css", "fab fa-react icon-react"],
                brief: "A visually stunning landing page with complex CSS animations and React state management.",
                img: "https://images.unsplash.com/photo-1507238691740-187a5b1d37b8?q=80&w=1000&auto=format&fit=crop"
            }
        ];

        // --- Logic to Render Cards ---
        function renderProjects(filter) {
            const grid = document.getElementById('projects-grid');
            grid.innerHTML = ''; // Clear existing

            const filteredProjects = filter === 'all' 
                ? projects 
                : projects.filter(p => p.category.includes(filter));

            filteredProjects.forEach(project => {
                const card = document.createElement('div');
                card.className = 'project-card fade-in';
                
                // Generate icons HTML
                const iconsHtml = project.techOrbit.map(iconClass => `<i class="${iconClass}"></i>`).join('');

                card.innerHTML = `
                    <div class="card-img-container">
                        <img src="${project.img}" alt="${project.name}" class="card-img">
                    </div>
                    
                    <div class="mission-label">MISSION NAME:</div>
                    <div class="project-title">${project.name}</div>
                    
                    <div class="tech-orbit-label">TECH ORBIT</div>
                    <div class="tech-icons">
                        ${iconsHtml}
                    </div>

                    <div class="mission-brief-label">MISSION BRIEF</div>
                    <div class="mission-desc">
                        ${project.brief}
                    </div>

                    <div class="card-buttons">
                        <a href="#" class="btn-card">Live Demo</a>
                        <a href="#" class="btn-card">GitHub Repo</a>
                    </div>
                `;
                grid.appendChild(card);
            });
        }

        // --- Filter Logic ---
        function filterProjects(category, btnElement) {
            // Update active button state
            document.querySelectorAll('.filter-btn').forEach(btn => btn.classList.remove('active'));
            btnElement.classList.add('active');

            // Render
            renderProjects(category);
        }
    </script>
</body>
</html>
