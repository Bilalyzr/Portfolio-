<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Skills - The Planets</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05070a;
            --card-bg: rgba(20, 30, 50, 0.85); /* Slightly darker for better readability */
            --glass-border: rgba(0, 210, 255, 0.3);
            --neon-blue: #00d2ff;
            --neon-purple: #bd00ff;
            --text-main: #ffffff;
            --text-secondary: #b3c5ef;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Background Effects --- */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background: 
                radial-gradient(1px 1px at 20px 30px, #fff, rgba(0,0,0,0)),
                radial-gradient(1px 1px at 40px 70px, #fff, rgba(0,0,0,0)),
                radial-gradient(2px 2px at 90px 40px, #fff, rgba(0,0,0,0)),
                radial-gradient(circle at 50% 50%, rgba(13, 20, 40, 0.0), #05070a 90%);
            background-size: 200px 200px, 100% 100%;
        }

        .nebula {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 80vw;
            height: 80vh;
            background: radial-gradient(circle, rgba(0, 80, 255, 0.1) 0%, transparent 70%);
            z-index: -1;
            filter: blur(50px);
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: center;
            padding: 20px;
            z-index: 10;
        }

        .nav-links {
            display: flex;
            gap: 30px;
        }

        .nav-links a {
            color: #aaa;
            text-decoration: none;
            font-family: 'Orbitron', sans-serif;
            font-size: 0.9rem;
            transition: 0.3s;
        }

        .nav-links a.active, .nav-links a:hover {
            color: var(--neon-blue);
            text-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- Header Text --- */
        .header-section {
            text-align: center;
            margin-top: 10px;
            z-index: 10;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            background: linear-gradient(90deg, #00d2ff, #bd00ff);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
        }

        .section-subtitle {
            color: var(--text-secondary);
            margin-top: 5px;
            font-size: 1rem;
        }

        /* --- Solar System Container --- */
        .universe-container {
            flex-grow: 1;
            position: relative;
            display: flex;
            justify-content: center;
            align-items: center;
            perspective: 1000px;
            margin-top: 20px;
        }

        /* Orbit Rings (Visual Only) */
        .orbit-ring {
            position: absolute;
            border: 1px solid rgba(255, 255, 255, 0.1);
            border-radius: 50%;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            pointer-events: none;
            transition: all 0.5s ease;
        }

        .ring-1 { width: 400px; height: 400px; border-color: rgba(0, 210, 255, 0.1); transform: translate(-50%, -50%) rotateX(60deg); }
        .ring-2 { width: 600px; height: 600px; border-color: rgba(189, 0, 255, 0.1); transform: translate(-50%, -50%) rotateX(60deg) rotateY(45deg); }
        .ring-3 { width: 500px; height: 500px; border-color: rgba(255, 255, 255, 0.05); transform: translate(-50%, -50%) rotate(0deg); }

        /* --- Central Info Card (HIDDEN BY DEFAULT) --- */
        .info-card {
            width: 380px;
            background: var(--card-bg);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid var(--glass-border);
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            z-index: 20;
            box-shadow: 0 0 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(0, 210, 255, 0.1);
            position: relative;
            
            /* Initial State: Hidden and Scaled Down */
            opacity: 0;
            transform: scale(0.5);
            pointer-events: none; /* Cannot click when hidden */
            transition: all 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); /* Bouncy effect */
        }

        /* State: Open (Added via JS) */
        .info-card.open {
            opacity: 1;
            transform: scale(1);
            pointer-events: all;
        }

        /* Close Button */
        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            color: var(--text-secondary);
            font-size: 1.2rem;
            cursor: pointer;
            transition: 0.3s;
        }
        .close-btn:hover { color: var(--neon-blue); transform: rotate(90deg); }

        .tech-icon-large { font-size: 3rem; margin-bottom: 15px; display: inline-block; }
        .card-title { font-family: 'Orbitron', sans-serif; font-size: 1.8rem; margin-bottom: 20px; color: white; }
        .card-details { text-align: left; font-size: 0.9rem; color: var(--text-secondary); line-height: 1.6; }
        .detail-row { margin-bottom: 15px; }
        .detail-label { color: var(--neon-blue); font-weight: 600; display: block; margin-bottom: 3px; }
        .progress-container { width: 100%; background: rgba(255,255,255,0.1); height: 8px; border-radius: 4px; margin-top: 5px; overflow: hidden; }
        .progress-bar { height: 100%; background: linear-gradient(90deg, var(--neon-blue), var(--neon-purple)); width: 0%; transition: width 1s ease; }
        
        .cta-btn {
            display: inline-block; margin-top: 20px; padding: 10px 25px; border: 1px solid var(--neon-blue);
            border-radius: 20px; color: white; text-decoration: none; font-size: 0.8rem; transition: 0.3s;
            background: rgba(0, 210, 255, 0.1);
        }
        .cta-btn:hover { background: var(--neon-blue); color: black; box-shadow: 0 0 20px var(--neon-blue); }

        /* --- Planets Layout --- */
        .planets-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 700px;
            height: 700px;
            pointer-events: none; 
            animation: slowRotate 60s linear infinite;
        }

        /* Class to pause rotation when card is open */
        .planets-wrapper.paused {
            animation-play-state: paused;
        }

        @keyframes slowRotate {
            from { transform: translate(-50%, -50%) rotate(0deg); }
            to { transform: translate(-50%, -50%) rotate(360deg); }
        }

        .planet {
            position: absolute;
            width: 70px;
            height: 70px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            font-size: 2rem;
            color: white;
            cursor: pointer;
            pointer-events: auto; 
            transition: all 0.3s ease;
            box-shadow: inset -5px -5px 15px rgba(0,0,0,0.5);
            animation: counterRotate 60s linear infinite; 
            border: 2px solid rgba(255,255,255,0.2);
            z-index: 5;
        }

        /* Pause counter-rotation too when wrapper pauses */
        .planets-wrapper.paused .planet {
            animation-play-state: paused;
        }

        @keyframes counterRotate {
            from { transform: rotate(0deg); }
            to { transform: rotate(-360deg); }
        }

        .planet:hover { transform: scale(1.2); z-index: 100; border-color: white; box-shadow: 0 0 20px var(--neon-blue); }
        .planet:active { transform: scale(0.9); }

        /* Planet Positioning */
        .p-react  { top: 5%; left: 50%; background: radial-gradient(circle at 30% 30%, #61dafb, #005f7a); color: #fff; }
        .p-html   { top: 18%; left: 82%; background: radial-gradient(circle at 30% 30%, #e34f26, #7a2008); color: #fff; }
        .p-css    { top: 50%; left: 95%; background: radial-gradient(circle at 30% 30%, #2965f1, #0a2e7a); color: #fff; }
        .p-js     { top: 82%; left: 82%; background: radial-gradient(circle at 30% 30%, #f7df1e, #8f7f00); color: #000; }
        .p-node   { top: 95%; left: 50%; background: radial-gradient(circle at 30% 30%, #6cc24a, #2e5e1a); color: #fff; }
        .p-python { top: 82%; left: 18%; background: radial-gradient(circle at 30% 30%, #3776ab, #133a5e); color: #fff; }
        .p-sql    { top: 50%; left: 5%;  background: radial-gradient(circle at 30% 30%, #bd00ff, #57007a); color: #fff; }
        .p-git    { top: 18%; left: 18%; background: radial-gradient(circle at 30% 30%, #f05032, #7a2211); color: #fff; }

        /* Responsive */
        @media (max-width: 768px) {
            .universe-container { transform: scale(0.6); margin-top: -50px; }
            .info-card { width: 320px; padding: 20px; }
            .section-title { font-size: 1.8rem; }
            .planets-wrapper { animation: none; } /* No spin on mobile for easier tapping */
            .planet { animation: none; }
        }
    </style>
</head>
<body>

    <div class="stars"></div>
    <div class="nebula"></div>

    <nav>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#" class="active">Skills</a>
            <a href="#">Projects</a>
            <a href="#">Resume</a>
            <a href="#">Contact</a>
        </div>
    </nav>

    <div class="header-section">
        <h1 class="section-title">Skills - The Planets</h1>
        <p class="section-subtitle">Click a planet to reveal the technology.</p>
    </div>

    <div class="universe-container">
        
        <div class="orbit-ring ring-1"></div>
        <div class="orbit-ring ring-2"></div>
        <div class="orbit-ring ring-3"></div>

        <div class="info-card" id="info-card">
            <div class="close-btn" onclick="closeCard()"><i class="fas fa-times"></i></div>
            
            <i class="fab fa-react tech-icon-large" id="card-icon" style="color: #61dafb;"></i>
            <h2 class="card-title" id="card-title">React.js</h2>
            
            <div class="card-details">
                <div class="detail-row">
                    <span class="detail-label">Tools Used:</span>
                    <span id="card-tools">...</span>
                </div>
                
                <div class="detail-row">
                    <span class="detail-label">Experience Level:</span>
                    <div style="display: flex; justify-content: space-between; align-items: center;">
                        <span id="card-level-text" style="font-size: 0.8rem;">...</span>
                        <span id="card-percent" style="font-size: 0.8rem;">...</span>
                    </div>
                    <div class="progress-container">
                        <div class="progress-bar" id="card-progress"></div>
                    </div>
                </div>

                <div class="detail-row">
                    <span class="detail-label">What You Can Build:</span>
                    <span id="card-desc">...</span>
                </div>
            </div>

            <a href="#" class="cta-btn">View Projects</a>
        </div>

        <div class="planets-wrapper" id="planets-wrapper">
            <div class="planet p-react" onclick="openSkill('react')" data-tech="react"><i class="fab fa-react"></i></div>
            <div class="planet p-html" onclick="openSkill('html')" data-tech="html"><i class="fab fa-html5"></i></div>
            <div class="planet p-css" onclick="openSkill('css')" data-tech="css"><i class="fab fa-css3-alt"></i></div>
            <div class="planet p-js" onclick="openSkill('js')" data-tech="js"><i class="fab fa-js"></i></div>
            <div class="planet p-node" onclick="openSkill('node')" data-tech="node"><i class="fab fa-node-js"></i></div>
            <div class="planet p-python" onclick="openSkill('python')" data-tech="python"><i class="fab fa-python"></i></div>
            <div class="planet p-sql" onclick="openSkill('sql')" data-tech="sql"><i class="fas fa-database"></i></div>
            <div class="planet p-git" onclick="openSkill('git')" data-tech="git"><i class="fab fa-git-alt"></i></div>
        </div>

    </div>

    <script>
        const skillsData = {
            react: { title: "React.js", icon: "fab fa-react", color: "#61dafb", tools: "Redux, React Router, Webpack, Babel", level: "Advanced", percent: "85%", desc: "Dynamic Single Page Applications (SPAs), Interactive UIs, Progressive Web Apps." },
            html: { title: "HTML5", icon: "fab fa-html5", color: "#e34f26", tools: "Semantic Tags, Canvas, LocalStorage", level: "Expert", percent: "95%", desc: "Structural foundation of web pages, accessibility compliance, SEO optimization." },
            css: { title: "CSS3", icon: "fab fa-css3-alt", color: "#2965f1", tools: "Flexbox, Grid, Tailwind, SCSS, Animations", level: "Advanced", percent: "90%", desc: "Responsive designs, complex layouts, visual effects and cross-browser compatibility." },
            js: { title: "JavaScript", icon: "fab fa-js", color: "#f7df1e", tools: "ES6+, DOM Manipulation, Fetch API, JSON", level: "Advanced", percent: "85%", desc: "Interactive logic, asynchronous operations, dynamic content updates." },
            node: { title: "Node.js", icon: "fab fa-node-js", color: "#6cc24a", tools: "Express, NPM, REST APIs, Socket.io", level: "Intermediate", percent: "70%", desc: "Server-side logic, scalable network applications, real-time communication servers." },
            python: { title: "Python", icon: "fab fa-python", color: "#3776ab", tools: "Django, Flask, NumPy, Pandas", level: "Intermediate", percent: "75%", desc: "Backend development, data analysis scripts, automation tools." },
            sql: { title: "SQL / Database", icon: "fas fa-database", color: "#bd00ff", tools: "MySQL, PostgreSQL, MongoDB, Prisma", level: "Intermediate", percent: "80%", desc: "Data modeling, complex queries, database optimization and management." },
            git: { title: "Git & GitHub", icon: "fab fa-git-alt", color: "#f05032", tools: "Version Control, Branching, CI/CD Actions", level: "Advanced", percent: "88%", desc: "Code collaboration, version history management, deployment workflows." }
        };

        const card = document.getElementById('info-card');
        const wrapper = document.getElementById('planets-wrapper');
        const cardProgress = document.getElementById('card-progress');

        function openSkill(key) {
            const data = skillsData[key];
            
            // 1. Populate Data
            document.getElementById('card-icon').className = `${data.icon} tech-icon-large`;
            document.getElementById('card-icon').style.color = data.color;
            document.getElementById('card-title').innerText = data.title;
            document.getElementById('card-tools').innerText = data.tools;
            document.getElementById('card-level-text').innerText = data.level;
            document.getElementById('card-percent').innerText = data.percent;
            document.getElementById('card-desc').innerText = data.desc;

            // Reset width to 0 first to re-trigger animation
            cardProgress.style.width = '0%';
            
            // 2. Show Card
            card.classList.add('open');
            
            // 3. Pause Orbit (Optional - good for focus)
            wrapper.classList.add('paused');

            // 4. Animate Progress Bar after card is visible
            setTimeout(() => {
                cardProgress.style.width = data.percent;
            }, 300);
        }

        function closeCard() {
            // 1. Hide Card
            card.classList.remove('open');
            
            // 2. Resume Orbit
            wrapper.classList.remove('paused');
        }
    </script>
</body>
</html>
