<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Galaxy - Portfolio</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05070a;
            --primary-glow: #00d2ff;
            --sun-color: #ffd700;
            --sun-glow: #ffaa00;
            --text-color: #ffffff;
            --orbit-color: rgba(255, 255, 255, 0.1);
            --glass-bg: rgba(255, 255, 255, 0.05);
            --glass-border: rgba(255, 255, 255, 0.2);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-color);
            font-family: 'Poppins', sans-serif;
            overflow: hidden; /* Prevent scrollbars for the hero */
            height: 100vh;
            width: 100vw;
            position: relative;
        }

        /* --- Star Background (Generated by JS) --- */
        #star-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
            pointer-events: none;
        }

        .star {
            position: absolute;
            background: white;
            border-radius: 50%;
            opacity: 0.8;
            animation: twinkle var(--duration) infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }

        /* --- Nebula Background Effect --- */
        .nebula {
            position: absolute;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 30%, rgba(0, 89, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 80% 70%, rgba(119, 0, 255, 0.15) 0%, transparent 40%),
                radial-gradient(circle at 50% 50%, rgba(0, 0, 0, 0) 0%, rgba(0,0,0,0.8) 100%);
            z-index: 0;
        }

        /* --- Navigation --- */
        nav {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            z-index: 100;
        }

        .logo {
            display: flex;
            align-items: center;
            gap: 15px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            font-weight: 700;
            text-shadow: 0 0 10px rgba(255,255,255,0.5);
        }

        .home-icon {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 1px solid var(--glass-border);
            display: flex;
            align-items: center;
            justify-content: center;
            background: var(--glass-bg);
            box-shadow: 0 0 10px var(--primary-glow);
        }

        .nav-links {
            display: flex;
            gap: 15px;
        }

        .nav-btn {
            text-decoration: none;
            color: white;
            padding: 8px 20px;
            border-radius: 20px;
            background: rgba(12, 20, 40, 0.6);
            border: 1px solid var(--glass-border);
            font-size: 0.9rem;
            transition: all 0.3s ease;
            backdrop-filter: blur(5px);
        }

        .nav-btn:hover {
            background: rgba(0, 210, 255, 0.2);
            border-color: var(--primary-glow);
            box-shadow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        /* --- Main Galaxy Scene --- */
        .scene-container {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 1000px;
            height: 1000px;
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 10;
            /* The 3D Perspective Magic */
            perspective: 1000px;
        }

        .solar-system {
            position: relative;
            width: 100%;
            height: 100%;
            transform-style: preserve-3d;
            /* Tilt the entire solar system */
            transform: rotateX(70deg); 
        }

        /* --- The Sun (Center) --- */
        .sun-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotateX(-70deg); /* Counter-rotate to face user */
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 50;
        }

        .sun {
            width: 180px;
            height: 180px;
            background: radial-gradient(circle, #fff5d6 0%, #ffaa00 40%, #ff5e00 100%);
            border-radius: 50%;
            box-shadow: 
                0 0 60px #ffaa00,
                0 0 120px rgba(255, 100, 0, 0.6),
                inset 0 0 30px rgba(255, 255, 255, 0.8);
            position: absolute;
        }

        .sun-text {
            position: absolute;
            text-align: center;
            width: 300px;
            z-index: 51;
            /* Ensure text sits on top of the glowing sun ball visually */
        }

        .sun-text h1 {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.8rem;
            color: #000;
            text-shadow: 0 0 5px rgba(255, 255, 255, 0.5);
            margin-bottom: 5px;
        }

        .sun-text p {
            font-size: 0.9rem;
            color: #222;
            font-weight: 600;
        }

        /* --- Orbits (Rings) --- */
        .orbit {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border: 1px solid var(--orbit-color);
            border-radius: 50%;
            box-shadow: 0 0 10px rgba(255, 255, 255, 0.05);
            pointer-events: none;
        }

        .orbit-1 { width: 350px; height: 350px; border-color: rgba(100, 255, 100, 0.2); }
        .orbit-2 { width: 600px; height: 600px; border-color: rgba(0, 210, 255, 0.2); }
        .orbit-3 { width: 900px; height: 900px; border-color: rgba(255, 100, 100, 0.2); }

        /* --- Planet Tracks (Invisible rotators) --- */
        /* These rotate around the Z axis of the tilted plane */
        .track {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            border-radius: 50%;
            transform-style: preserve-3d;
        }

        .track-1 { width: 350px; height: 350px; animation: rotate 15s linear infinite; }
        .track-2 { width: 600px; height: 600px; animation: rotate 25s linear infinite reverse; }
        .track-3 { width: 900px; height: 900px; animation: rotate 40s linear infinite; }

        @keyframes rotate {
            0% { transform: translate(-50%, -50%) rotateZ(0deg); }
            100% { transform: translate(-50%, -50%) rotateZ(360deg); }
        }

        /* --- Planets --- */
        .planet-container {
            position: absolute;
            top: 50%; /* Position on the rim */
            right: 0; /* Start at right edge */
            margin-top: -30px; /* Half of planet size */
            margin-right: -30px;
            width: 60px;
            height: 60px;
            transform-style: preserve-3d;
        }

        /* Positions for multiple planets on the same track using rotation */
        .pos-1 { transform: rotateZ(0deg) translateX(175px) rotateZ(0deg); } /* Radius of track 1 / 2 */
        .pos-2 { transform: rotateZ(120deg) translateX(175px) rotateZ(-120deg); }
        
        /* Calculated Translations based on Orbit Radius (Width/2) */
        /* Track 1 (350px) -> Radius 175px */
        /* Track 2 (600px) -> Radius 300px */
        /* Track 3 (900px) -> Radius 450px */

        .p-wrapper {
            position: absolute;
            transform-style: preserve-3d;
        }
        
        /* Node.js */
        .p-node { transform: rotateZ(45deg) translate(175px); }
        
        /* React */
        .p-react { transform: rotateZ(225deg) translate(175px); }

        /* HTML5 Middle */
        .p-html-mid { transform: rotateZ(0deg) translate(300px); }
        
        /* Database Middle */
        .p-db { transform: rotateZ(180deg) translate(300px); }

        /* Python Outer */
        .p-python { transform: rotateZ(300deg) translate(450px); }
        
        /* HTML5 Outer */
        .p-html-out { transform: rotateZ(120deg) translate(450px); }
        
        /* CSS Outer */
        .p-css { transform: rotateZ(210deg) translate(450px); }


        /* The Planet Sphere (Visual) */
        .planet {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            color: white;
            position: relative;
            /* Counter-rotate X to stand upright against the solar system tilt.
               Counter-rotate Z (via animation) to prevent the icon from spinning as it orbits.
            */
            transform: rotateX(-90deg); 
            animation: maintain-upright linear infinite; 
            /* Box Shadows for Atmosphere */
            box-shadow: inset -5px -5px 10px rgba(0,0,0,0.5), 0 0 15px currentColor;
            border: 1px solid rgba(255,255,255,0.3);
        }

        /* Since the track rotates, the planet rotates with it. We need to counter-spin the planet body
           so the icon stays upright relative to the screen, not the orbit center. */
        
        /* Actually, simply rotating X to -70deg makes it face UP. 
           Because the parent is spinning Z, the 'Up' direction changes relative to screen.
           We need a smarter counter-rotation animation that matches the track speed. 
        */

        .planet-body {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
            font-size: 30px;
            /* To make the planet face the screen at all times:
               1. Undo the X tilt (-70deg).
               2. Undo the Z rotation of the track.
            */
            transform: rotateX(-70deg); 
            box-shadow: 0 0 20px rgba(255,255,255,0.2);
            background: #222;
        }

        /* Specific Planet Styles */
        .style-node { background: radial-gradient(circle at 30% 30%, #6cc24a, #3e6e2a); box-shadow: 0 0 20px #6cc24a; }
        .style-react { background: radial-gradient(circle at 30% 30%, #61dafb, #2d6675); box-shadow: 0 0 20px #61dafb; }
        .style-html { background: radial-gradient(circle at 30% 30%, #e34f26, #8a2be2); box-shadow: 0 0 20px #e34f26; }
        .style-python { background: radial-gradient(circle at 30% 30%, #3776ab, #ffd343); box-shadow: 0 0 20px #3776ab; }
        .style-db { background: radial-gradient(circle at 30% 30%, #d93856, #801f30); box-shadow: 0 0 20px #d93856; }
        .style-css { background: radial-gradient(circle at 30% 30%, #2965f1, #102d6e); box-shadow: 0 0 20px #2965f1; }


        /* We need an animation on the planet-body to counter the Z-rotation of the track */
        .counter-rot-1 { animation: anti-spin 15s linear infinite reverse; }
        .counter-rot-2 { animation: anti-spin 25s linear infinite; } /* Track 2 is reversed, so this is normal */
        .counter-rot-3 { animation: anti-spin 40s linear infinite reverse; }

        @keyframes anti-spin {
            0% { transform: rotateX(-70deg) rotateZ(0deg); }
            100% { transform: rotateX(-70deg) rotateZ(360deg); }
        }


        /* --- CTA Button --- */
        .cta-container {
            position: absolute;
            bottom: 15%;
            left: 50%;
            transform: translateX(-50%);
            z-index: 200;
        }

        .cta-btn {
            padding: 15px 40px;
            background: linear-gradient(90deg, rgba(13,20,45,0.8) 0%, rgba(30,40,70,0.8) 100%);
            border: 2px solid #00d2ff;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 1.1rem;
            font-weight: 600;
            border-radius: 50px;
            cursor: pointer;
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.3);
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: all 0.3s ease;
        }

        .cta-btn:hover {
            background: #00d2ff;
            color: #000;
            box-shadow: 0 0 40px rgba(0, 210, 255, 0.6);
        }

        /* --- Decorative Elements --- */
        .comet {
            position: absolute;
            width: 150px;
            height: 2px;
            background: linear-gradient(90deg, transparent, #fff);
            top: 30%;
            left: 10%;
            transform: rotate(-45deg);
            opacity: 0;
            animation: shoot 6s ease-in-out infinite;
            z-index: 5;
        }

        @keyframes shoot {
            0% { transform: translateX(0) translateY(0) rotate(-45deg); opacity: 0; }
            10% { opacity: 1; }
            20% { transform: translateX(500px) translateY(500px) rotate(-45deg); opacity: 0; }
            100% { opacity: 0; }
        }

        /* Responsive */
        @media (max-width: 768px) {
            .scene-container { transform: translate(-50%, -50%) scale(0.6); }
            .nav-links { display: none; } /* Simplified for mobile */
            .logo { font-size: 1.2rem; }
            .sun-text h1 { font-size: 1.2rem; }
            .sun-text p { font-size: 0.7rem; }
        }

    </style>
</head>
<body>

    <div id="star-container"></div>
    <div class="nebula"></div>
    <div class="comet"></div>

    <nav>
        <div class="logo">
            <div class="home-icon"><i class="fas fa-home"></i></div>
            <span>The Galaxy</span>
        </div>
        <div class="nav-links">
            <a href="#" class="nav-btn">About</a>
            <a href="#" class="nav-btn">Projects</a>
            <a href="#" class="nav-btn">Resume</a>
            <a href="#" class="nav-btn">Contact</a>
        </div>
    </nav>

    <div class="scene-container">
        <div class="solar-system">
            
            <div class="orbit orbit-1"></div>
            <div class="orbit orbit-2"></div>
            <div class="orbit orbit-3"></div>

            <div class="sun-wrapper">
                <div class="sun"></div>
                <div class="sun-text">
                    <h1>Mohammed Bilal</h1>
                    <p>Web Developer / Full Stack Learner</p>
                </div>
            </div>

            <div class="track track-1">
                <div class="p-wrapper p-node">
                    <div class="planet-body style-node counter-rot-1">
                        <i class="fab fa-node-js"></i>
                    </div>
                </div>
                <div class="p-wrapper p-react">
                    <div class="planet-body style-react counter-rot-1">
                        <i class="fab fa-react"></i>
                    </div>
                </div>
            </div>

            <div class="track track-2">
                <div class="p-wrapper p-html-mid">
                    <div class="planet-body style-html counter-rot-2">
                        <i class="fab fa-html5"></i>
                    </div>
                </div>
                <div class="p-wrapper p-db">
                    <div class="planet-body style-db counter-rot-2">
                        <i class="fas fa-database"></i>
                    </div>
                </div>
            </div>

            <div class="track track-3">
                <div class="p-wrapper p-python">
                    <div class="planet-body style-python counter-rot-3">
                        <i class="fab fa-python"></i>
                    </div>
                </div>
                <div class="p-wrapper p-html-out">
                    <div class="planet-body style-html counter-rot-3">
                        <i class="fab fa-html5"></i>
                    </div>
                </div>
                <div class="p-wrapper p-css">
                    <div class="planet-body style-css counter-rot-3">
                        <i class="fab fa-css3-alt"></i>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div class="cta-container">
        <button class="cta-btn">Explore My Tech Galaxy</button>
    </div>

    <script>
        // Generate Star Background
        document.addEventListener('DOMContentLoaded', () => {
            const starContainer = document.getElementById('star-container');
            const starCount = 200;

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.classList.add('star');
                
                // Random Position
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                
                // Random Size
                const size = Math.random() * 2 + 1;
                
                // Random Animation Duration
                const duration = Math.random() * 3 + 2;

                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.setProperty('--duration', `${duration}s`);

                starContainer.appendChild(star);
            }
        });
    </script>
</body>
</html>
