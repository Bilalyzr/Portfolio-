<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact - Mission Control</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --bg-color: #05070a;
            --glass-bg: rgba(10, 20, 30, 0.6);
            --neon-blue: #00d2ff;
            --neon-purple: #bd00ff;
            --text-main: #ffffff;
            --text-secondary: #b3c5ef;
            --border-glow: 0 0 15px rgba(0, 210, 255, 0.4);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Poppins', sans-serif;
            min-height: 100vh;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
        }

        /* --- Background --- */
        .stars {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%; z-index: -2;
            background: radial-gradient(circle at 50% 50%, rgba(13, 20, 40, 0.0), #05070a 90%);
        }
        
        .nebula {
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 80% 90%, rgba(189, 0, 255, 0.1), transparent 50%);
            z-index: -1;
        }

        /* --- Navigation --- */
        nav {
            display: flex;
            justify-content: center;
            padding: 20px;
            backdrop-filter: blur(5px);
            border-bottom: 1px solid rgba(255,255,255,0.1);
            background: rgba(0,0,0,0.3);
            z-index: 100;
        }
        .nav-links a {
            color: #aaa; text-decoration: none; font-family: 'Orbitron', sans-serif; 
            margin: 0 15px; font-size: 0.9rem; transition: 0.3s;
        }
        .nav-links a.active, .nav-links a:hover {
            color: var(--neon-blue); text-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- Header --- */
        .header-section {
            text-align: center;
            padding: 40px 20px;
        }

        .section-title {
            font-family: 'Orbitron', sans-serif;
            font-size: 2.5rem;
            color: var(--neon-blue);
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.6);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .section-subtitle {
            color: var(--text-main);
            margin-top: 10px;
            font-size: 1.1rem;
        }

        /* --- Main Layout --- */
        .mission-control-container {
            display: flex;
            justify-content: center;
            align-items: stretch;
            max-width: 1200px;
            margin: 0 auto 50px;
            padding: 20px;
            gap: 50px;
            flex-wrap: wrap;
        }

        /* --- Left Side: Form --- */
        .form-panel {
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
        }

        .panel-header {
            font-family: 'Orbitron', sans-serif;
            font-size: 1.5rem;
            color: var(--neon-blue);
            margin-bottom: 30px;
            text-shadow: 0 0 10px var(--neon-blue);
            text-align: center;
        }

        .input-group {
            margin-bottom: 20px;
        }

        .neon-input {
            width: 100%;
            background: rgba(255, 255, 255, 0.05);
            border: 1px solid var(--neon-blue);
            border-radius: 8px;
            padding: 15px;
            color: white;
            font-family: 'Poppins', sans-serif;
            font-size: 1rem;
            outline: none;
            transition: all 0.3s ease;
            box-shadow: 0 0 5px rgba(0, 210, 255, 0.2);
        }

        .neon-input:focus {
            background: rgba(0, 210, 255, 0.1);
            box-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
            border-color: #fff;
        }

        textarea.neon-input {
            resize: vertical;
            min-height: 150px;
        }

        .send-btn {
            background: transparent;
            color: var(--neon-blue);
            border: 2px solid var(--neon-blue);
            padding: 15px 40px;
            font-family: 'Orbitron', sans-serif;
            font-size: 1.1rem;
            cursor: pointer;
            transition: 0.3s;
            text-transform: uppercase;
            letter-spacing: 1px;
            border-radius: 5px;
            box-shadow: 0 0 10px rgba(0, 210, 255, 0.2);
            width: 100%;
            margin-top: 10px;
        }

        .send-btn:hover {
            background: var(--neon-blue);
            color: #000;
            box-shadow: 0 0 30px rgba(0, 210, 255, 0.8);
        }

        .success-msg {
            text-align: center;
            color: #4aff4a;
            font-family: 'Orbitron', sans-serif;
            margin-top: 20px;
            opacity: 0;
            transform: translateY(10px);
            transition: all 0.5s ease;
        }
        .success-msg.visible {
            opacity: 1;
            transform: translateY(0);
        }

        /* --- Center Divider --- */
        .divider {
            width: 2px;
            background: linear-gradient(to bottom, transparent, var(--neon-blue), var(--neon-purple), transparent);
            box-shadow: 0 0 10px var(--neon-blue);
        }

        /* --- Right Side: Info Panel --- */
        .info-panel {
            flex: 1;
            min-width: 350px;
            display: flex;
            flex-direction: column;
            gap: 30px;
        }

        .info-card {
            background: rgba(189, 0, 255, 0.05);
            border: 1px solid var(--neon-purple);
            border-radius: 10px;
            padding: 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
            box-shadow: 0 0 10px rgba(189, 0, 255, 0.2);
        }

        .info-card:hover {
            transform: translateX(10px);
            box-shadow: 0 0 25px rgba(189, 0, 255, 0.5);
            background: rgba(189, 0, 255, 0.15);
        }

        .info-icon {
            font-size: 2.5rem;
            color: var(--neon-purple);
            width: 50px;
            text-align: center;
            text-shadow: 0 0 10px rgba(189, 0, 255, 0.6);
        }

        .info-content h3 {
            font-family: 'Orbitron', sans-serif;
            color: var(--neon-blue);
            font-size: 1.1rem;
            margin-bottom: 5px;
        }

        .info-content p, .info-content a {
            color: #fff;
            text-decoration: none;
            font-size: 1rem;
            transition: 0.2s;
        }
        
        .info-content a:hover {
            color: var(--neon-blue);
        }

        /* Responsive */
        @media (max-width: 900px) {
            .mission-control-container { flex-direction: column; align-items: center; }
            .divider { width: 100%; height: 2px; background: linear-gradient(to right, transparent, var(--neon-blue), transparent); margin: 30px 0; }
            .form-panel, .info-panel { width: 100%; }
        }
    </style>
</head>
<body>

    <div class="stars" id="star-bg"></div>
    <div class="nebula"></div>

    <nav>
        <div class="nav-links">
            <a href="#">Home</a>
            <a href="#">About</a>
            <a href="#">Skills</a>
            <a href="#">Projects</a>
            <a href="#">Resume</a>
            <a href="#" class="active">Contact</a>
        </div>
    </nav>

    <div class="header-section">
        <h1 class="section-title">CONTACT - 'MISSION CONTROL'</h1>
        <p class="section-subtitle">Ready to launch a project? Initiate contact sequence.</p>
    </div>

    <div class="mission-control-container">

        <div class="form-panel">
            <h2 class="panel-header">Let's Connect</h2>
            <form id="contactForm" onsubmit="handleSubmit(event)">
                <div class="input-group">
                    <input type="text" class="neon-input" placeholder="Name" required>
                </div>
                <div class="input-group">
                    <input type="email" class="neon-input" placeholder="Email" required>
                </div>
                <div class="input-group">
                    <input type="text" class="neon-input" placeholder="Subject" required>
                </div>
                <div class="input-group">
                    <textarea class="neon-input" placeholder="Message" required></textarea>
                </div>
                <button type="submit" class="send-btn">SEND MESSAGE</button>
            </form>
            <div class="success-msg" id="successMsg">
                <i class="fas fa-check-circle"></i> Transmission Sent Successfully!
            </div>
        </div>

        <div class="divider"></div>

        <div class="info-panel">
            <h2 class="panel-header">Mission Control Panel</h2>
            
            <div class="info-card">
                <div class="info-icon"><i class="fas fa-satellite-dish"></i></div>
                <div class="info-content">
                    <h3>EMAIL:</h3>
                    <p>bilal@example.com</p>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon"><i class="fas fa-broadcast-tower"></i></div>
                <div class="info-content">
                    <h3>LINKEDIN:</h3>
                    <a href="#" target="_blank">linkedin.com/in/mohammedbilal</a>
                </div>
            </div>

            <div class="info-card">
                <div class="info-icon"><i class="fas fa-rocket"></i></div>
                <div class="info-content">
                    <h3>GITHUB:</h3>
                    <a href="#" target="_blank">github.com/mbilaltech</a>
                </div>
            </div>

        </div>

    </div>

    <script>
        // --- Star Background ---
        document.addEventListener('DOMContentLoaded', () => {
            const starBg = document.getElementById('star-bg');
            for(let i=0; i<150; i++) {
                const star = document.createElement('div');
                star.style.position = 'absolute';
                star.style.background = 'white';
                star.style.borderRadius = '50%';
                
                const x = Math.random() * 100;
                const y = Math.random() * 100;
                const size = Math.random() * 2 + 1;
                
                star.style.left = `${x}%`;
                star.style.top = `${y}%`;
                star.style.width = `${size}px`;
                star.style.height = `${size}px`;
                star.style.opacity = Math.random();
                star.style.animation = `twinkle ${Math.random()*2 + 1}s infinite alternate`;
                
                starBg.appendChild(star);
            }
        });

        // --- Form Handling ---
        function handleSubmit(e) {
            e.preventDefault();
            const btn = document.querySelector('.send-btn');
            const msg = document.getElementById('successMsg');
            
            // Loading State
            btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> TRANSMITTING...';
            btn.style.opacity = '0.7';

            // Simulate Network Delay
            setTimeout(() => {
                btn.innerHTML = 'TRANSMISSION SENT';
                btn.style.background = '#4aff4a'; // Green
                btn.style.color = 'black';
                btn.style.borderColor = '#4aff4a';
                btn.style.boxShadow = '0 0 20px #4aff4a';
                
                msg.classList.add('visible');
                
                // Reset after delay
                setTimeout(() => {
                    document.getElementById('contactForm').reset();
                    btn.innerHTML = 'SEND MESSAGE';
                    btn.style = ''; // Reset styles
                    msg.classList.remove('visible');
                }, 3000);

            }, 1500);
        }

        // Add CSS for twinkle
        const style = document.createElement('style');
        style.innerHTML = `
            @keyframes twinkle {
                from { opacity: 0.2; }
                to { opacity: 1; }
            }
        `;
        document.head.appendChild(style);
    </script>
</body>
</html>
