<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 4 — Holographic File Stack</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:'Inter',sans-serif;min-height:100vh;overflow-x:hidden}
.section{max-width:1200px;margin:0 auto;padding:60px 20px}
h2{font-family:'Montserrat',sans-serif;font-size:2.8rem;text-align:center;margin-bottom:8px;font-weight:800}
.subtitle{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:#00d2ff;letter-spacing:4px;text-transform:uppercase;opacity:.6;margin-bottom:40px}
.filters{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:50px}
.filters button{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.45);padding:8px 20px;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;transition:all .3s}
.filters button.active{background:rgba(0,210,255,.12);border-color:#00d2ff;color:#00d2ff}
/* Stack Container */
.stack-container{position:relative;width:100%;height:480px;display:flex;align-items:center;justify-content:center;perspective:1200px}
.stack-card{position:absolute;width:360px;height:420px;background:rgba(8,15,30,.9);backdrop-filter:blur(20px);border:1px solid rgba(255,255,255,.06);border-radius:16px;overflow:hidden;cursor:pointer;transition:all .6s cubic-bezier(.25,.46,.45,.94);display:flex;flex-direction:column;transform-style:preserve-3d}
.stack-card::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.1),transparent)}
/* Stacking transforms — set by JS */
.stack-card.active{z-index:10;box-shadow:0 25px 80px rgba(0,0,0,.5),0 0 60px rgba(0,210,255,.1);border-color:rgba(0,210,255,.25)}
.stack-card:not(.active):hover{border-color:rgba(0,210,255,.15)}
/* Holographic glow on active */
.stack-card.active::after{content:'';position:absolute;inset:-2px;border-radius:17px;background:conic-gradient(from 0deg,transparent 0%,rgba(0,210,255,.3) 8%,transparent 16%,transparent 100%);z-index:-1;animation:holoSpin 3s linear infinite}
@keyframes holoSpin{from{transform:rotate(0deg)}to{transform:rotate(360deg)}}
.card-img{width:100%;height:180px;position:relative;overflow:hidden}
.card-img-bg{width:100%;height:100%}
.card-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:50%;background:linear-gradient(to top,rgba(8,15,30,1),transparent)}
.card-body{padding:22px;flex:1;display:flex;flex-direction:column}
.cb-code{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#00d2ff;letter-spacing:2px;margin-bottom:4px}
.cb-status{display:inline-flex;align-items:center;gap:4px;font-family:'JetBrains Mono',monospace;font-size:.55rem;color:#34d399;margin-bottom:10px}
.cb-status-dot{width:5px;height:5px;border-radius:50%;background:#34d399;box-shadow:0 0 5px rgba(52,211,153,.4)}
.cb-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.1rem;line-height:1.3;margin-bottom:10px}
.cb-tools{font-family:'JetBrains Mono',monospace;font-size:.65rem;color:rgba(255,255,255,.35);margin-bottom:10px}
.cb-tools span{color:#00d2ff}
.cb-brief{font-size:.82rem;color:rgba(255,255,255,.5);line-height:1.5;flex:1}
/* Navigation */
.stack-nav{display:flex;justify-content:center;gap:20px;margin-top:20px}
.nav-arrow{width:44px;height:44px;border-radius:50%;background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.4);transition:all .3s;font-size:.9rem}
.nav-arrow:hover{border-color:rgba(0,210,255,.3);color:#00d2ff;background:rgba(0,210,255,.05)}
.nav-dots{display:flex;align-items:center;gap:8px}
.nav-dot{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.15);cursor:pointer;transition:all .3s}
.nav-dot.active{background:#00d2ff;box-shadow:0 0 8px rgba(0,210,255,.4)}
/* Responsive */
@media(max-width:768px){
    .stack-container{height:auto;perspective:none;flex-direction:column;gap:16px;padding:10px 0}
    .stack-card{position:relative!important;width:100%!important;max-width:400px;height:auto;transform:none!important;opacity:1!important}
    .stack-card::after{display:none}
    .stack-nav{display:none}
    h2{font-size:2rem}
}
</style>
</head>
<body>
<div class="section">
    <h2>Missions Log</h2>
    <p class="subtitle">Holographic Files &mdash; Stack View</p>
    <div class="filters">
        <button class="active" data-filter="all">All Missions</button>
        <button data-filter="react">React</button>
        <button data-filter="python">Python</button>
        <button data-filter="ai">AI & ML</button>
        <button data-filter="web">Web</button>
    </div>
    <div class="stack-container" id="stackContainer"></div>
    <div class="stack-nav">
        <div class="nav-arrow" id="prevBtn"><i class="fas fa-chevron-left"></i></div>
        <div class="nav-dots" id="navDots"></div>
        <div class="nav-arrow" id="nextBtn"><i class="fas fa-chevron-right"></i></div>
    </div>
</div>
<script>
const projects=[
    {id:1,codename:"ALPHA-01",name:"Control Mouse with Hand Gesture Detection",tools:"Python, OpenCV, MediaPipe",categories:["python","ai"],status:"complete",brief:"Computer vision system for touchless interaction recognizing real-time hand gestures.",gradient:"linear-gradient(135deg,#1a0a2e,#0d2847,#0a2818)"},
    {id:2,codename:"BETA-02",name:"Credit Card Fraud Detection Using ML",tools:"Python, Scikit-learn, Pandas, NumPy",categories:["python","ai"],status:"complete",brief:"ML classification model to detect fraudulent financial transactions.",gradient:"linear-gradient(135deg,#0d2847,#1a0a2e,#2d1810)"},
    {id:3,codename:"GAMMA-03",name:"Tutor LMS Platform",tools:"React JS, WordPress, HTML/CSS",categories:["web","react"],status:"complete",brief:"Developed responsive interfaces and customized platform modules.",gradient:"linear-gradient(135deg,#061224,#0a2818,#0d2847)"},
    {id:4,codename:"DELTA-04",name:"Conference Website",tools:"HTML, CSS, JavaScript, Figma",categories:["web"],status:"complete",brief:"Static web page for an international conference.",gradient:"linear-gradient(135deg,#0a1628,#0d2847,#1a0a2e)"}
];

let activeFilter='all';
let activeIndex=0;
const container=document.getElementById('stackContainer');
const dotsContainer=document.getElementById('navDots');

function getFiltered(){return activeFilter==='all'?projects:projects.filter(p=>p.categories.includes(activeFilter))}

function render(){
    const filtered=getFiltered();
    if(activeIndex>=filtered.length)activeIndex=0;
    container.innerHTML='';
    dotsContainer.innerHTML='';

    filtered.forEach((p,i)=>{
        const card=document.createElement('div');
        card.className='stack-card'+(i===activeIndex?' active':'');
        const offset=i-activeIndex;
        if(window.innerWidth>768){
            card.style.transform=`translateX(${offset*30}px) translateZ(${-Math.abs(offset)*80}px) rotateY(${offset*-5}deg)`;
            card.style.opacity=Math.abs(offset)>2?0:1-Math.abs(offset)*.2;
            card.style.zIndex=10-Math.abs(offset);
        }
        card.innerHTML=`
            <div class="card-img"><div class="card-img-bg" style="background:${p.gradient}"></div></div>
            <div class="card-body">
                <div class="cb-code">${p.codename}</div>
                <div class="cb-status"><span class="cb-status-dot"></span>COMPLETE</div>
                <div class="cb-name">${p.name}</div>
                <div class="cb-tools"><span>PAYLOAD:</span> ${p.tools}</div>
                <div class="cb-brief">${p.brief}</div>
            </div>
        `;
        card.addEventListener('click',()=>{activeIndex=i;render()});
        container.appendChild(card);

        const dot=document.createElement('div');
        dot.className='nav-dot'+(i===activeIndex?' active':'');
        dot.addEventListener('click',()=>{activeIndex=i;render()});
        dotsContainer.appendChild(dot);
    });
}

document.getElementById('prevBtn').addEventListener('click',()=>{const f=getFiltered();activeIndex=(activeIndex-1+f.length)%f.length;render()});
document.getElementById('nextBtn').addEventListener('click',()=>{const f=getFiltered();activeIndex=(activeIndex+1)%f.length;render()});

document.querySelectorAll('.filters button').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter=btn.dataset.filter;
        activeIndex=0;
        render();
    });
});

window.addEventListener('resize',render);
render();
</script>
</body>
</html>
