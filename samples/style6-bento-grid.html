<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Style 6 — Deep Space Bento Grid</title>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&family=JetBrains+Mono:wght@300;400;500&family=Montserrat:wght@700;800&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#050505;color:#fff;font-family:'Inter',sans-serif;min-height:100vh}
.section{max-width:1100px;margin:0 auto;padding:60px 20px}
h2{font-family:'Montserrat',sans-serif;font-size:2.8rem;text-align:center;margin-bottom:8px;font-weight:800}
.subtitle{text-align:center;font-family:'JetBrains Mono',monospace;font-size:.75rem;color:#00d2ff;letter-spacing:4px;text-transform:uppercase;opacity:.6;margin-bottom:40px}
.filters{display:flex;justify-content:center;flex-wrap:wrap;gap:10px;margin-bottom:35px}
.filters button{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.08);color:rgba(255,255,255,.45);padding:8px 20px;border-radius:4px;cursor:pointer;font-family:'JetBrains Mono',monospace;font-size:.7rem;letter-spacing:1.5px;text-transform:uppercase;transition:all .3s}
.filters button.active{background:rgba(0,210,255,.12);border-color:#00d2ff;color:#00d2ff}
/* Bento Grid */
.bento{display:grid;grid-template-columns:repeat(3,1fr);grid-auto-rows:220px;gap:18px}
/* Featured card: spans 2 cols and 2 rows */
.bento-card.featured{grid-column:span 2;grid-row:span 2}
.bento-card{background:rgba(255,255,255,.03);border:1px solid rgba(255,255,255,.06);border-radius:14px;overflow:hidden;cursor:pointer;position:relative;display:flex;flex-direction:column;transition:all .5s cubic-bezier(.175,.885,.32,1.275)}
/* Stellar glow border on hover */
.bento-card::before{content:'';position:absolute;inset:-1px;border-radius:15px;background:conic-gradient(from var(--angle,0deg),transparent 0%,rgba(0,210,255,.3) 8%,transparent 16%,transparent 50%,rgba(189,0,255,.2) 58%,transparent 66%,transparent 100%);z-index:-1;opacity:0;transition:opacity .4s;animation:glowSpin 4s linear infinite}
@property --angle{syntax:'<angle>';initial-value:0deg;inherits:false}
@keyframes glowSpin{from{--angle:0deg}to{--angle:360deg}}
.bento-card:hover::before{opacity:1}
.bento-card:hover{transform:translateY(-4px);border-color:rgba(0,210,255,.2);box-shadow:0 15px 50px rgba(0,0,0,.4),0 0 40px rgba(0,210,255,.06)}
/* Nebula glow on hover */
.bento-card::after{content:'';position:absolute;top:-30%;left:-30%;width:160%;height:160%;background:radial-gradient(circle at center,rgba(0,210,255,.06) 0%,transparent 60%);opacity:0;transition:opacity .4s;pointer-events:none;z-index:0}
.bento-card:hover::after{opacity:1}
/* Card image */
.bc-img{flex:1;min-height:0;position:relative;overflow:hidden}
.bc-img-bg{width:100%;height:100%;transition:transform .5s}
.bento-card:hover .bc-img-bg{transform:scale(1.05)}
.bc-img::after{content:'';position:absolute;bottom:0;left:0;right:0;height:60%;background:linear-gradient(to top,rgba(5,5,5,1),transparent);pointer-events:none}
/* Featured: animated stars canvas inside */
.featured .bc-img canvas{position:absolute;top:0;left:0;width:100%;height:100%;z-index:0}
/* Codename badge */
.bc-codename{position:absolute;top:12px;left:12px;font-family:'JetBrains Mono',monospace;font-size:.55rem;letter-spacing:2px;color:#00d2ff;background:rgba(5,5,5,.8);backdrop-filter:blur(8px);border:1px solid rgba(0,210,255,.2);padding:3px 10px;border-radius:3px;z-index:5;text-transform:uppercase}
/* Status badge */
.bc-status{position:absolute;top:12px;right:12px;font-family:'JetBrains Mono',monospace;font-size:.5rem;letter-spacing:1.5px;color:#34d399;background:rgba(52,211,153,.08);border:1px solid rgba(52,211,153,.2);padding:3px 8px;border-radius:3px;z-index:5;display:flex;align-items:center;gap:4px}
.bc-status-dot{width:4px;height:4px;border-radius:50%;background:#34d399}
.bc-body{padding:18px;position:relative;z-index:2}
.featured .bc-body{padding:24px}
.bc-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:.95rem;line-height:1.3;margin-bottom:6px}
.featured .bc-name{font-size:1.3rem;margin-bottom:10px}
.bc-tools{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:rgba(255,255,255,.3);letter-spacing:.5px;margin-bottom:6px}
.bc-tools span{color:#00d2ff}
.bc-brief{font-size:.8rem;color:rgba(255,255,255,.45);line-height:1.5;display:none}
.featured .bc-brief{display:block}
/* Modal */
.modal-overlay{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(3,5,10,.88);backdrop-filter:blur(12px);z-index:9999;display:flex;justify-content:center;align-items:center;opacity:0;visibility:hidden;transition:all .4s}
.modal-overlay.open{opacity:1;visibility:visible}
.modal-card{background:rgba(8,15,28,.98);border:1px solid rgba(0,210,255,.15);border-radius:14px;width:90%;max-width:520px;max-height:85vh;overflow-y:auto;position:relative;transform:translateY(20px) scale(.95);transition:all .4s cubic-bezier(.2,.8,.2,1)}
.modal-overlay.open .modal-card{transform:translateY(0) scale(1)}
.modal-close{position:absolute;top:14px;right:14px;width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.05);border:1px solid rgba(255,255,255,.08);display:flex;align-items:center;justify-content:center;cursor:pointer;color:rgba(255,255,255,.4);z-index:10;transition:all .3s;font-size:.8rem}
.modal-close:hover{color:#ff5f57;border-color:rgba(255,95,87,.3)}
.modal-img{width:100%;height:200px;overflow:hidden;border-radius:14px 14px 0 0}
.modal-img-bg{width:100%;height:100%}
.modal-body{padding:24px}
.mb-code{font-family:'JetBrains Mono',monospace;font-size:.6rem;color:#00d2ff;letter-spacing:2px;margin-bottom:6px}
.mb-name{font-family:'Montserrat',sans-serif;font-weight:700;font-size:1.2rem;margin-bottom:12px;line-height:1.3}
.mb-row{display:flex;gap:10px;margin-bottom:8px;font-family:'JetBrains Mono',monospace;font-size:.75rem}
.mb-label{color:#00d2ff;min-width:65px;letter-spacing:1px}
.mb-label::after{content:' ......';color:rgba(255,255,255,.1)}
.mb-value{color:rgba(255,255,255,.7)}
.mb-divider{height:1px;background:linear-gradient(90deg,transparent,rgba(0,210,255,.12),transparent);margin:16px 0}
.mb-brief{font-size:.88rem;color:rgba(255,255,255,.5);line-height:1.7}
/* Responsive */
@media(max-width:900px){
    .bento{grid-template-columns:repeat(2,1fr);grid-auto-rows:200px}
    .bento-card.featured{grid-column:span 2;grid-row:span 1}
}
@media(max-width:600px){
    .bento{grid-template-columns:1fr;grid-auto-rows:auto}
    .bento-card.featured{grid-column:span 1;grid-row:span 1}
    .bc-img{height:150px;flex:none}
    .bc-brief{display:block}
    h2{font-size:2rem}
}
</style>
</head>
<body>
<div class="section">
    <h2>Missions Log</h2>
    <p class="subtitle">Deep Space Bento &mdash; Grid View</p>
    <div class="filters">
        <button class="active" data-filter="all">All Missions</button>
        <button data-filter="react">React</button>
        <button data-filter="python">Python</button>
        <button data-filter="ai">AI & ML</button>
        <button data-filter="web">Web</button>
    </div>
    <div class="bento" id="bentoGrid"></div>
</div>
<!-- Modal -->
<div class="modal-overlay" id="modalOverlay">
    <div class="modal-card">
        <span class="modal-close" id="modalClose"><i class="fas fa-times"></i></span>
        <div class="modal-img"><div class="modal-img-bg" id="modalImg"></div></div>
        <div class="modal-body">
            <div class="mb-code" id="modalCode"></div>
            <div class="mb-name" id="modalName"></div>
            <div class="mb-row"><span class="mb-label">STATUS</span><span class="mb-value" id="modalStatus"></span></div>
            <div class="mb-row"><span class="mb-label">PAYLOAD</span><span class="mb-value" id="modalTools"></span></div>
            <div class="mb-divider"></div>
            <p class="mb-brief" id="modalBrief"></p>
        </div>
    </div>
</div>
<script>
const projects=[
    {id:1,codename:"ALPHA-01",name:"Control Mouse with Hand Gesture Detection",tools:"Python, OpenCV, MediaPipe",categories:["python","ai"],status:"complete",brief:"Computer vision system for touchless interaction recognizing real-time hand gestures.",gradient:"linear-gradient(135deg,#1a0a2e 0%,#0d2847 50%,#0a2818 100%)"},
    {id:2,codename:"BETA-02",name:"Credit Card Fraud Detection Using ML",tools:"Python, Scikit-learn, Pandas, NumPy",categories:["python","ai"],status:"complete",brief:"ML classification model to detect fraudulent financial transactions.",gradient:"linear-gradient(135deg,#0d2847 0%,#1a0a2e 50%,#2d1810 100%)"},
    {id:3,codename:"GAMMA-03",name:"Tutor LMS Platform",tools:"React JS, WordPress, HTML/CSS",categories:["web","react"],status:"complete",brief:"Developed responsive interfaces and customized platform modules with AI-driven tools.",gradient:"linear-gradient(135deg,#061224 0%,#0a2818 50%,#0d2847 100%)"},
    {id:4,codename:"DELTA-04",name:"Conference Website",tools:"HTML, CSS, JavaScript, Figma",categories:["web"],status:"complete",brief:"Designed and developed a static web page for an international conference.",gradient:"linear-gradient(135deg,#0a1628 0%,#0d2847 50%,#1a0a2e 100%)"}
];

const grid=document.getElementById('bentoGrid');
const overlay=document.getElementById('modalOverlay');
let activeFilter='all';

function render(){
    const filtered=activeFilter==='all'?projects:projects.filter(p=>p.categories.includes(activeFilter));
    grid.innerHTML='';
    filtered.forEach((p,i)=>{
        const card=document.createElement('div');
        card.className='bento-card'+(i===0?' featured':'');
        card.innerHTML=`
            <div class="bc-img">
                <div class="bc-img-bg" style="background:${p.gradient}"></div>
                ${i===0?'<canvas id="featuredCanvas"></canvas>':''}
                <span class="bc-codename">${p.codename}</span>
                <span class="bc-status"><span class="bc-status-dot"></span>COMPLETE</span>
            </div>
            <div class="bc-body">
                <div class="bc-name">${p.name}</div>
                <div class="bc-tools"><span>PAYLOAD:</span> ${p.tools}</div>
                <div class="bc-brief">${p.brief}</div>
            </div>
        `;
        card.addEventListener('click',()=>openModal(p));
        grid.appendChild(card);
    });
    // Animate featured card stars
    const fc=document.getElementById('featuredCanvas');
    if(fc)initStarCanvas(fc);
}

function initStarCanvas(canvas){
    const ctx=canvas.getContext('2d');
    function resize(){canvas.width=canvas.offsetWidth;canvas.height=canvas.offsetHeight}
    resize();
    const stars=[];
    for(let i=0;i<40;i++){stars.push({x:Math.random()*canvas.width,y:Math.random()*canvas.height,s:Math.random()*1.2+.3,o:Math.random(),sp:Math.random()*.015+.005,ph:Math.random()*Math.PI*2})}
    function draw(t){
        ctx.clearRect(0,0,canvas.width,canvas.height);
        stars.forEach(s=>{
            const a=s.o*(Math.sin(t*s.sp+s.ph)*.3+.7);
            ctx.beginPath();ctx.arc(s.x,s.y,s.s,0,Math.PI*2);
            ctx.fillStyle=`rgba(180,210,255,${a})`;ctx.fill();
        });
        requestAnimationFrame(draw);
    }
    requestAnimationFrame(draw);
    window.addEventListener('resize',resize);
}

function openModal(p){
    document.getElementById('modalImg').style.background=p.gradient;
    document.getElementById('modalCode').textContent=p.codename;
    document.getElementById('modalName').textContent=p.name;
    document.getElementById('modalStatus').textContent='COMPLETE';
    document.getElementById('modalTools').textContent=p.tools;
    document.getElementById('modalBrief').textContent=p.brief;
    overlay.classList.add('open');
    document.body.style.overflow='hidden';
}

document.getElementById('modalClose').addEventListener('click',()=>{overlay.classList.remove('open');document.body.style.overflow=''});
overlay.addEventListener('click',(e)=>{if(e.target===overlay){overlay.classList.remove('open');document.body.style.overflow=''}});

document.querySelectorAll('.filters button').forEach(btn=>{
    btn.addEventListener('click',()=>{
        document.querySelectorAll('.filters button').forEach(b=>b.classList.remove('active'));
        btn.classList.add('active');
        activeFilter=btn.dataset.filter;
        render();
    });
});
render();
</script>
</body>
</html>
